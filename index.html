<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <title>フルーツキャッチ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            overflow: hidden;
            touch-action: none;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 100%);
            font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            max-width: 500px;
            overflow: hidden;
            background: linear-gradient(180deg, #87CEEB 0%, #B2EBF2 50%, #81C784 95%, #4CAF50 100%);
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .score-display {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 25px;
            padding: 8px 18px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .lives-display {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 25px;
            padding: 8px 18px;
            font-size: 18px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .combo-display {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            border-radius: 25px;
            padding: 6px 16px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            box-shadow: 0 3px 10px rgba(255,107,107,0.3);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 10;
        }

        .combo-display.visible {
            opacity: 1;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .screen-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.6);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .screen-overlay.visible {
            opacity: 1;
            pointer-events: all;
        }

        .screen-title {
            font-size: 42px;
            font-weight: bold;
            color: white;
            text-shadow: 0 3px 10px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        .screen-subtitle {
            font-size: 18px;
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
        }

        .screen-emoji {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 1.5s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .btn {
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            border: none;
            border-radius: 30px;
            padding: 16px 50px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255,107,107,0.4);
            transition: transform 0.1s;
            margin-top: 15px;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .final-score {
            font-size: 60px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 0 3px 10px rgba(0,0,0,0.3);
            margin: 10px 0;
        }

        .high-score {
            font-size: 16px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 10px;
        }

        .score-popup {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            z-index: 20;
            animation: popUp 0.8s ease-out forwards;
        }

        @keyframes popUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
        }

        .cloud {
            position: absolute;
            font-size: 40px;
            opacity: 0.6;
            animation: cloudMove linear infinite;
        }

        @keyframes cloudMove {
            from { transform: translateX(-100px); }
            to { transform: translateX(calc(100vw + 100px)); }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="canvas"></canvas>

        <!-- UI -->
        <div id="ui-overlay">
            <div class="score-display" id="score-display">Score: 0</div>
            <div class="lives-display" id="lives-display"></div>
        </div>
        <div class="combo-display" id="combo-display">COMBO x2!</div>

        <!-- Start Screen -->
        <div class="screen-overlay visible" id="start-screen">
            <div class="screen-emoji">🧺🍎</div>
            <div class="screen-title">フルーツキャッチ</div>
            <div class="screen-subtitle">フルーツをキャッチしよう！</div>
            <button class="btn" id="start-btn">スタート</button>
        </div>

        <!-- Game Over Screen -->
        <div class="screen-overlay" id="gameover-screen">
            <div class="screen-emoji">😢</div>
            <div class="screen-title">ゲームオーバー</div>
            <div class="final-score" id="final-score">0</div>
            <div class="high-score" id="high-score">ハイスコア: 0</div>
            <button class="btn" id="restart-btn">もう一度</button>
        </div>
    </div>

    <script>
        // Game Configuration
        const CONFIG = {
            BASKET_WIDTH: 80,
            BASKET_HEIGHT: 50,
            FRUIT_SIZE: 40,
            INITIAL_SPEED: 2.5,
            SPEED_INCREMENT: 0.15,
            SPAWN_INTERVAL_INITIAL: 1200,
            SPAWN_INTERVAL_MIN: 500,
            MAX_LIVES: 3,
            LEVEL_UP_SCORE: 10,
        };

        // Fruits data
        const FRUITS = [
            { emoji: '🍎', points: 1, color: '#FF4444' },
            { emoji: '🍊', points: 1, color: '#FF8C00' },
            { emoji: '🍋', points: 1, color: '#FFD700' },
            { emoji: '🍇', points: 2, color: '#8B008B' },
            { emoji: '🍓', points: 2, color: '#FF1493' },
            { emoji: '🍑', points: 2, color: '#FFDAB9' },
            { emoji: '🌟', points: 5, color: '#FFD700' },
        ];

        const BAD_ITEMS = [
            { emoji: '💣', points: -3, color: '#333' },
        ];

        // Game State
        let game = {
            running: false,
            score: 0,
            highScore: parseInt(localStorage.getItem('fruitCatchHighScore') || '0'),
            lives: CONFIG.MAX_LIVES,
            level: 1,
            combo: 0,
            basket: { x: 0, y: 0 },
            fruits: [],
            particles: [],
            spawnTimer: 0,
            lastTime: 0,
            speed: CONFIG.INITIAL_SPEED,
            spawnInterval: CONFIG.SPAWN_INTERVAL_INITIAL,
        };

        // Canvas setup
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('game-container');

        function resizeCanvas() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            game.basket.x = canvas.width / 2;
            game.basket.y = canvas.height - 80;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // DOM elements
        const scoreDisplay = document.getElementById('score-display');
        const livesDisplay = document.getElementById('lives-display');
        const comboDisplay = document.getElementById('combo-display');
        const startScreen = document.getElementById('start-screen');
        const gameoverScreen = document.getElementById('gameover-screen');
        const finalScore = document.getElementById('final-score');
        const highScoreDisplay = document.getElementById('high-score');

        // Touch/Mouse handling
        let isDragging = false;

        function getEventX(e) {
            const rect = canvas.getBoundingClientRect();
            if (e.touches) {
                return e.touches[0].clientX - rect.left;
            }
            return e.clientX - rect.left;
        }

        container.addEventListener('touchstart', (e) => {
            if (!game.running) {
                return; // ボタンのタッチイベントをブロックしない
            }
            e.preventDefault();
            isDragging = true;
            game.basket.x = getEventX(e);
        }, { passive: false });

        container.addEventListener('touchmove', (e) => {
            if (!game.running || !isDragging) return;
            e.preventDefault();
            game.basket.x = getEventX(e);
            // Clamp basket position
            game.basket.x = Math.max(CONFIG.BASKET_WIDTH / 2, Math.min(canvas.width - CONFIG.BASKET_WIDTH / 2, game.basket.x));
        }, { passive: false });

        container.addEventListener('touchend', () => {
            isDragging = false;
        });

        // Mouse support for desktop testing
        container.addEventListener('mousedown', (e) => {
            if (!game.running) return;
            isDragging = true;
            game.basket.x = getEventX(e);
        });

        container.addEventListener('mousemove', (e) => {
            if (!game.running || !isDragging) return;
            game.basket.x = getEventX(e);
            game.basket.x = Math.max(CONFIG.BASKET_WIDTH / 2, Math.min(canvas.width - CONFIG.BASKET_WIDTH / 2, game.basket.x));
        });

        container.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // Spawn fruit
        function spawnFruit() {
            const isBad = Math.random() < 0.15 && game.level > 2;
            const itemPool = isBad ? BAD_ITEMS : FRUITS;
            let item;

            if (!isBad) {
                // Higher point fruits appear less frequently
                const rand = Math.random();
                if (rand < 0.05 && game.level > 3) {
                    item = FRUITS[6]; // Star
                } else if (rand < 0.3) {
                    item = FRUITS[Math.floor(Math.random() * 3) + 3]; // 2-point fruits
                } else {
                    item = FRUITS[Math.floor(Math.random() * 3)]; // 1-point fruits
                }
            } else {
                item = BAD_ITEMS[0];
            }

            const fruit = {
                x: Math.random() * (canvas.width - CONFIG.FRUIT_SIZE * 2) + CONFIG.FRUIT_SIZE,
                y: -CONFIG.FRUIT_SIZE,
                emoji: item.emoji,
                points: item.points,
                color: item.color,
                speed: game.speed + Math.random() * 1,
                rotation: 0,
                rotationSpeed: (Math.random() - 0.5) * 0.1,
                size: CONFIG.FRUIT_SIZE,
                isBad: isBad,
            };

            game.fruits.push(fruit);
        }

        // Create particles
        function createParticles(x, y, color, count = 8) {
            for (let i = 0; i < count; i++) {
                game.particles.push({
                    x,
                    y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8 - 3,
                    size: Math.random() * 6 + 3,
                    color,
                    life: 1,
                    decay: 0.02 + Math.random() * 0.02,
                });
            }
        }

        // Show score popup
        function showScorePopup(x, y, points) {
            const popup = document.createElement('div');
            popup.className = 'score-popup';
            popup.style.left = x + 'px';
            popup.style.top = y + 'px';

            if (points > 0) {
                popup.textContent = `+${points}`;
                popup.style.color = '#4CAF50';
            } else {
                popup.textContent = `${points}`;
                popup.style.color = '#FF4444';
            }

            container.appendChild(popup);
            setTimeout(() => popup.remove(), 800);
        }

        // Update game
        function update(deltaTime) {
            if (!game.running) return;

            // Spawn timer
            game.spawnTimer += deltaTime;
            if (game.spawnTimer > game.spawnInterval) {
                spawnFruit();
                game.spawnTimer = 0;
            }

            // Update fruits
            for (let i = game.fruits.length - 1; i >= 0; i--) {
                const fruit = game.fruits[i];
                fruit.y += fruit.speed;
                fruit.rotation += fruit.rotationSpeed;

                // Check catch
                const dx = fruit.x - game.basket.x;
                const dy = fruit.y - game.basket.y;

                if (Math.abs(dx) < CONFIG.BASKET_WIDTH / 2 + 10 && Math.abs(dy) < CONFIG.BASKET_HEIGHT / 2 + 10) {
                    // Caught!
                    if (fruit.isBad) {
                        game.combo = 0;
                        game.score = Math.max(0, game.score + fruit.points);
                        createParticles(fruit.x, fruit.y, '#333', 12);
                        showScorePopup(fruit.x, fruit.y, fruit.points);
                        // Vibrate if supported
                        if (navigator.vibrate) navigator.vibrate(100);
                    } else {
                        game.combo++;
                        const comboMultiplier = Math.min(game.combo, 5);
                        const points = fruit.points * comboMultiplier;
                        game.score += points;
                        createParticles(fruit.x, fruit.y, fruit.color, 10);
                        showScorePopup(fruit.x, fruit.y, points);

                        if (game.combo >= 2) {
                            comboDisplay.textContent = `COMBO x${game.combo}!`;
                            comboDisplay.classList.add('visible');
                            setTimeout(() => comboDisplay.classList.remove('visible'), 1000);
                        }
                    }

                    game.fruits.splice(i, 1);
                    updateUI();

                    // Level up
                    const newLevel = Math.floor(game.score / CONFIG.LEVEL_UP_SCORE) + 1;
                    if (newLevel > game.level) {
                        game.level = newLevel;
                        game.speed = CONFIG.INITIAL_SPEED + (game.level - 1) * CONFIG.SPEED_INCREMENT;
                        game.spawnInterval = Math.max(CONFIG.SPAWN_INTERVAL_MIN, CONFIG.SPAWN_INTERVAL_INITIAL - (game.level - 1) * 80);
                    }
                    continue;
                }

                // Missed
                if (fruit.y > canvas.height + CONFIG.FRUIT_SIZE) {
                    if (!fruit.isBad) {
                        game.lives--;
                        game.combo = 0;
                        if (navigator.vibrate) navigator.vibrate(200);
                        updateUI();

                        if (game.lives <= 0) {
                            gameOver();
                            return;
                        }
                    }
                    game.fruits.splice(i, 1);
                }
            }

            // Update particles
            for (let i = game.particles.length - 1; i >= 0; i--) {
                const p = game.particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2;
                p.life -= p.decay;
                if (p.life <= 0) {
                    game.particles.splice(i, 1);
                }
            }
        }

        // Draw game
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw particles
            game.particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;

            // Draw fruits
            game.fruits.forEach(fruit => {
                ctx.save();
                ctx.translate(fruit.x, fruit.y);
                ctx.rotate(fruit.rotation);
                ctx.font = `${fruit.size}px serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(fruit.emoji, 0, 0);
                ctx.restore();
            });

            // Draw basket
            const bx = game.basket.x;
            const by = game.basket.y;

            // Basket shadow
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.beginPath();
            ctx.ellipse(bx, by + 30, 40, 8, 0, 0, Math.PI * 2);
            ctx.fill();

            // Basket body
            ctx.font = '55px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🧺', bx, by);
        }

        // Update UI
        function updateUI() {
            scoreDisplay.textContent = `Score: ${game.score}`;
            let hearts = '';
            for (let i = 0; i < CONFIG.MAX_LIVES; i++) {
                hearts += i < game.lives ? '❤️' : '🖤';
            }
            livesDisplay.textContent = hearts;
        }

        // Game loop
        function gameLoop(timestamp) {
            if (!game.lastTime) game.lastTime = timestamp;
            const deltaTime = timestamp - game.lastTime;
            game.lastTime = timestamp;

            update(deltaTime);
            draw();

            requestAnimationFrame(gameLoop);
        }

        // Start game
        function startGame() {
            game.running = true;
            game.score = 0;
            game.lives = CONFIG.MAX_LIVES;
            game.level = 1;
            game.combo = 0;
            game.fruits = [];
            game.particles = [];
            game.spawnTimer = 0;
            game.speed = CONFIG.INITIAL_SPEED;
            game.spawnInterval = CONFIG.SPAWN_INTERVAL_INITIAL;
            game.lastTime = 0;
            game.basket.x = canvas.width / 2;

            updateUI();
            startScreen.classList.remove('visible');
            gameoverScreen.classList.remove('visible');
        }

        // Game over
        function gameOver() {
            game.running = false;

            if (game.score > game.highScore) {
                game.highScore = game.score;
                localStorage.setItem('fruitCatchHighScore', game.highScore.toString());
            }

            finalScore.textContent = game.score;
            highScoreDisplay.textContent = `ハイスコア: ${game.highScore}`;
            gameoverScreen.classList.add('visible');
        }

        // Event listeners
        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', startGame);

        // Prevent default touch behaviors only during game
        document.addEventListener('touchmove', (e) => {
            if (game.running) e.preventDefault();
        }, { passive: false });

        // Initialize
        updateUI();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
